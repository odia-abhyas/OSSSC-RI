<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Odia Abhyas</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
  .q-image-wrap{margin:12px 0;display:flex;justify-content:center;align-items:center}
  .img-loader{width:50px;height:50px;border:5px solid #ddd;border-top:5px solid #2c5364;border-radius:50%;animation:spin 1s linear infinite}
  .q-image{max-width:100%;border-radius:12px;display:none}
  *{box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
  body{margin:0;background:#f4f6f8;padding:0}
  .loader{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
  .circle{width:70px;height:70px;border:7px solid #ddd;border-top:7px solid #2c5364;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .hidden{display:none}
  .header{background:#fff;padding:12px;display:flex;justify-content:space-between;border-bottom:1px solid #ddd}
  .container{padding:14px}
  button{padding:12px;border:none;border-radius:10px;background:#2c5364;color:#fff;font-size:15px;cursor:pointer}
  button:disabled{opacity:.4}
  .q-inst{font-size:14px}
  .question{font-weight:bold;margin:8px 0}
  .option{background:#fff;border:1px solid #ccc;padding:12px;border-radius:10px;margin-bottom:10px;cursor:pointer}
  .option.selected{background:#e8f1f5;border-color:#2c5364}
  .nav{display:flex;justify-content:space-between;margin:10px 0}
  .grid{display:flex;flex-wrap:wrap;gap:6px}
  .grid div{width:32px;height:32px;border:1px solid #2c5364;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .grid .attempted{background:#2c5364;color:#fff;border-radius:50%}
  .score{padding:16px}
  .card{background:#fff;padding:12px;border-radius:12px;margin-bottom:10px}
  .filter{display:flex;gap:6px;margin-top:10px}
  .filter button{flex:1;background:#ccc;color:#000}
  .filter .active{background:#2c5364;color:#fff}
  .popup{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;justify-content:center;align-items:center}
  .popup-box{background:#fff;padding:18px;border-radius:14px;width:85%;text-align:center}
</style>
</head>
<body>

<div id="loader" class="loader">
  <div class="circle"></div>
  <p>Checking user…</p>
</div>

<div id="instruction" class="hidden container">
  <h3>OSSSC RI Odia Sectional - 1</h3>
  <ul>
    <li>Time: 20 Minutes</li>
    <li>Total Questions: 20 </li>
    <li>Negative Marking: 0.25 per wrong answer</li>
    <li>Submit anytime</li>
  </ul>
  <button onclick="startTest()">Start Test</button>
</div>

<div id="test" class="hidden">
  <div class="header">
    <b></b>
      <div class="q-inst">OSSSC RI Odia Sectional - 1</div>
    <span id="timer">20:00</span>
  </div>
  <div class="container">
    
    

    <div id="imgWrap" class="q-image-wrap hidden">
      <div id="imgLoader" class="img-loader"></div>
      <img id="qImg" class="q-image">
    </div>
<div class="question" id="question"></div>
    <div id="options"></div>

    <div class="nav">
      <button id="prevBtn" onclick="prevQ()">Previous</button>
      <button id="nextBtn" onclick="nextQ()">Next</button>
    </div>

    <div class="grid" id="grid"></div>
    <br>
    <button onclick="submitTest()">Submit Test</button>
  </div>
</div>

<div id="score" class="hidden score">
  <h3> OSSSC RI Odia Sectional - 1</h3>
  <p id="userScore"></p>
  <div class="card" id="stats"></div>

  <div class="filter">
    <button class="active" onclick="filterQ('all',this)">All</button>
    <button onclick="filterQ('correct',this)">Correct</button>
    <button onclick="filterQ('wrong',this)">Wrong</button>
    <button onclick="filterQ('unattempted',this)">Unattempted</button>
  </div>

  <div id="review"></div>
  <br>
  <button onclick="reattempt()">Reattempt</button>
</div>

<div class="popup" id="popup">
  <div class="popup-box">
    <p>Your previous score & rank will be replaced.</p>
    <button onclick="confirmReattempt()">OK</button>
  </div>
</div>

<script>
firebase.initializeApp({
apiKey: "AIzaSyAm8LD9iSm24vG2rc_bBSjXuATXxs7-lbE",
  authDomain: "odia-abhyas.firebaseapp.com",
  projectId: "odia-abhyas"
});
const db = firebase.firestore();

const TEST_ID = "OSSSC RI Odia Sectional - 1";

const user = {
  phone: localStorage.getItem("user_phone"),

if(!user.phone){ alert("Login required"); throw ""; }

/* ===== Added explanations to questions ===== */
const questions = [

{q:"'ଉତ୍କର୍ଷ' ଶବ୍ଦର ସଠିକ୍ ବିପରୀତ ଶବ୍ଦଟି ବାଛନ୍ତୁ।",
 o:["ଅପକର୍ଷ","ଅପକର୍ଷତା","ନିଷ୍କର୍ଷ","ଆକର୍ଷ"],
 a:0,
 exp:"‘ଉତ୍କର୍ଷ’ର ଅର୍ଥ ଉନ୍ନତି, ତେଣୁ ତାହାର ବିପରୀତ ‘ଅପକର୍ଷ’ ଅର୍ଥାତ୍ ଅବନତି।"},

{q:"The investigation is still underway.",
 o:["ତଦନ୍ତ ଏବେ ଶେଷ ହୋଇଛି।","ତଦନ୍ତ ଏବେ ମଧ୍ୟ ଜାରି ରହିଛି","ତଦନ୍ତ ବହୁ ଆଗରୁ ସରିଛି।","ତଦନ୍ତ କରିବାକୁ ହେବ।"],
 a:1,
 exp:"‘still underway’ର ଅର୍ଥ ହେଉଛି ଏଯାଏ ଚାଲିଛି, ସେଥିପାଇଁ ‘ଜାରି ରହିଛି’ ସଠିକ୍।"},

{q:"ନୟନ ର ତଦ୍ଭବ ଶବ୍ଦ କେଉଁଟି?",
 o:["ଆଖି","ଚକ୍ଷୁ","ଲୋଚନ","ନେତ୍ର"],
 a:0,
 exp:"‘ନୟନ’ର ସାଧାରଣ ଚଳିତ ଶବ୍ଦ ‘ଆଖି’ ଯାହା ତଦ୍ଭବ।"},

{q:"Choose the correct English translation:\nବୃକ୍ଷରୋପଣ ଦ୍ଵାରା ଜଳବାୟୁ ପରିବର୍ତ୍ତନକୁ ରୋକାଯାଇପାରିବ।",
 o:["Planting trees can stop climate change.","Plantation increases climate change.","Trees are important for climate change.","Climate change stops because of trees."],
 a:0,
 exp:"ବାକ୍ୟର ଅର୍ଥ ହେଉଛି ଗଛ ଲଗାଇବା ଦ୍ଵାରା ପରିବର୍ତ୍ତନକୁ ରୋକାଯାଇପାରେ।"},

{q:"କେଉଁ ଶବ୍ଦଟିର ବନାନ ସଠିକ୍ ଅଟେ?",

 a:0,

{q:"ଦିଆଯାଇଥିବା ଇଂରାଜୀ ବାକ୍ୟକୁ ଓଡ଼ିଆରେ ଅନୁବାଦ କରନ୍ତୁ:\nIt has been raining since morning.",
 o:["ସକାଳୁ ବର୍ଷା ହେବ।","ସକାଳୁ ବର୍ଷା ହେଉଥିଲା।","ସକାଳୁ ବର୍ଷା ହେଉଛି।","ସକାଳେ ବର୍ଷା ହୋଇଥିଲା।"],

{q:"ଏକ ପଦରେ ପ୍ରକାଶ କରନ୍ତୁ: 'ଯାହା ପୂର୍ବରୁ ଶୁଣାଯାଇ ନାହିଁ' -",

 exp:"ଏଠାରେ ବାଧା ପାଇଁ ବର୍ଷା ବେଶି ଥିଲା, ସେଥିପାଇଁ ‘ପ୍ରବଳ’ ଠିକ୍।"},

{q:"'ଅନୁରକ୍ତ' ଶବ୍ଦର ବିପରୀତ ଶବ୍ଦ ଚୟନ କରନ୍ତୁ।",
 o:["ବିରକ୍ତ","ବିମୁଖ","ପ୍ରତିରକ୍ତ","ବିରକ୍ତ"],

 exp:"‘ଅନୁରକ୍ତ’ ଅର୍ଥ ଆସକ୍ତ, ତାହାର ବିପରୀତ ‘ବିରକ୍ତ’।"},

{q:"ଅଧ୍ୟବସାୟୀ ବ୍ୟକ୍ତି ହିଁ ଜୀବନରେ ସଫଳତା ________।",
 o:["ପାଉଥିଲେ","ଲାଭ କରନ୍ତି","ହୋଇଥାଏ","କରିଯାଆନ୍ତି"],

{q:"ବାକ୍ୟ: ପବନ ଧୀରେ ଧୀରେ ବହୁଛି। କ୍ରିୟା ବିଶେଷଣ ଚିହ୍ନଟ କରନ୍ତୁ।",
 o:["ପବନ","ବହୁଛି","ଧୀରେ ଧୀରେ","କେଉଁଟି ବି ନୁହେଁ"],

{q:"'କପାଳ ଫାଟିବା' ରୂଢ଼ିର ଅର୍ଥ କ’ଣ?",

{q:"ପ୍ରଯୁକ୍ତିବିଦ୍ୟା\nP. ଉପଯୋଗ କରି\nQ. କ୍ଷେତ୍ରରେ ବିପ୍ଳବ\nR. ଶିକ୍ଷା ଓ ସ୍ଵାସ୍ଥ୍ୟ\nS. ଆଣିବା ସମ୍ଭବ ହୋଇଛି",
 o:["PRQS","RPQS","PQRS","RQPS"],

 exp:"ସଠିକ୍ ବ୍ୟବସ୍ଥା ‘RQPS’ ଯାହାରେ ବାକ୍ୟ ଅର୍ଥପୂର୍ଣ୍ଣ ହୁଏ।"},

{q:"ଅକାଳ କୁଷ୍ମାଣ୍ଡ ରୂଢ଼ିର ପ୍ରକୃତ ଅର୍ଥ କ’ଣ?",
 o:["ଅଦିନିଆ କଖାରୁ","ଅଯୋଗ୍ୟ ବ୍ୟକ୍ତି","ବହୁତ ଜ୍ଞାନୀ","ସମୟ ପୂର୍ବରୁ ବଡ଼ ହେବା"],
 a:1,

{q:"Choose the correct English translation:\nଛାତ୍ରମାନେ ଶୃଙ୍ଖଳିତ ହେବା ଉଚିତ।",

{q:"<span style='font-weight: normal;'> ନିମ୍ନଲିଖିତ ଅନୁଚ୍ଛେଦକୁ ଧ୍ୟାନର ସହିତ ପଢ଼ନ୍ତୁ ଏବଂ ଦିଆଯାଇଥିବା ପ୍ରଶ୍ନଗୁଡ଼ିକର ସଠିକ୍ ଉତ୍ତର ବାଛନ୍ତୁ।<br><br>ଗଣତାନ୍ତ୍ରିକ ବ୍ୟବସ୍ଥାରେ ନିର୍ବାଚନ ହେଉଛି ଜନମତର ପ୍ରତିଫଳନ ଏବଂ ଓଡ଼ିଶା ଭଳି ଏକ ରାଜ୍ୟରେ ଏହାର ଗୁରୁତ୍ୱ ଅତି ବ୍ୟାପକ। ଓଡ଼ିଶାର ରାଜନୈତିକ ଇତିହାସକୁ ଅନୁଧ୍ୟାନ କଲେ ଜଣାଯାଏ ଯେ, ଏଠାରେ ଭୋଟରମାନେ ସ୍ଥିରତା ଏବଂ ପ୍ରଗତିଶୀଳ ନେତୃତ୍ୱକୁ ସର୍ବଦା ପ୍ରାଧାନ୍ୟ ଦେଇଛନ୍ତି। ନିର୍ବାଚନ କେବଳ ପ୍ରତିନିଧି ଚୟନର ଏକ ମାଧ୍ୟମ ନୁହେଁ, ବରଂ ଏହା ରାଜ୍ୟର ଆର୍ଥସାମାଜିକ ରୂପରେଖ ନିର୍ଦ୍ଧାରଣ କରିବାର ଏକ ଶକ୍ତିଶାଳୀ ଆୟୁଧ। ଓଡ଼ିଶାରେ ନିର୍ବାଚନ ସମୟରେ ବିଭିନ୍ନ ଆଞ୍ଚଳିକ ଏବଂ ଜାତୀୟ ଦଳଗୁଡ଼ିକ ମଧ୍ୟରେ ଚାଲିଥିବା ପ୍ରତିଦ୍ୱନ୍ଦ୍ୱିତା ଗଣତନ୍ତ୍ରକୁ ଅଧିକ ସୁଦୃଢ଼ କରିଥାଏ। ବିଶେଷ କରି ମହିଳା ଭୋଟରଙ୍କ ସକ୍ରିୟ ଅଂଶଗ୍ରହଣ ଏବଂ ସ୍ୱୟଂ ସହାୟକ ଗୋଷ୍ଠୀଗୁଡ଼ିକର ପ୍ରଭାବ ଓଡ଼ିଶା ନିର୍ବାଚନକୁ ଏକ ନୂତନ ମୋଡ଼ ଦେଇଛି। <br><br>ତେବେ ନିର୍ବାଚନ ପ୍ରକ୍ରିୟାରେ ସ୍ୱଚ୍ଛତା ଏବଂ ନିରପେକ୍ଷତା ବଜାୟ ରଖିବା ପ୍ରଶାସନ ପାଇଁ ଏକ ବଡ଼ ଆହ୍ୱାନ। ଅର୍ଥବଳ ଓ ବାହୁବଳର ପ୍ରଭାବକୁ ରୋକିବା ସହ ଶାନ୍ତିପୂର୍ଣ୍ଣ ଭାବେ ମତଦାନ ସାବ୍ୟସ୍ତ କରିବା ଉପରେ ନିର୍ବାଚନ କମିଶନ ଗୁରୁତ୍ୱାରୋପ କରନ୍ତି। ଗ୍ରାମାଞ୍ଚଳର ଶିକ୍ଷିତ ଯୁବପିଢ଼ି ଏବେ ନିର୍ବାଚନୀ ଇସ୍ତାହାର ଏବଂ ବିକାଶମୂଳକ କାର୍ଯ୍ୟର ମୂଲ୍ୟାଙ୍କନ କରି ଭୋଟ ଦେବାକୁ ଆଗ୍ରହ ପ୍ରକାଶ କରୁଛନ୍ତି, ଯାହା ଏକ ସୁସ୍ଥ ଗଣତନ୍ତ୍ରର ସୂଚକ। ଓଡ଼ିଶାରେ ସ୍ଥାନୀୟ ସମସ୍ୟା ଯଥା କୃଷି, ଶିଳ୍ପାୟନ ଏବଂ ନିଯୁକ୍ତି ନିର୍ବାଚନର ମୁଖ୍ୟ ପ୍ରସଙ୍ଗ ପାଲଟିଥାଏ। ରାଜନୈତିକ ଦଳଗୁଡ଼ିକ ନିଜର ପ୍ରଚାର ମାଧ୍ୟମରେ ଜନସାଧାରଣଙ୍କ ନିକଟତର ହେବାକୁ ଚେଷ୍ଟା କରୁଥିବା ବେଳେ, ଶେଷ ନିଷ୍ପତ୍ତି କେବଳ ଜନତା ଜନାର୍ଦ୍ଦନଙ୍କ ହାତରେ ହିଁ ଥାଏ।</span><br><br> ଅନୁଚ୍ଛେଦ ଅନୁଯାୟୀ, ଓଡ଼ିଶା ନିର୍ବାଚନରେ କେଉଁ ବିଷୟଟି ଏକ ନୂତନ ପରିବର୍ତ୍ତନ ଆଣିଛି?",
   o:['କେବଳ ପୁରୁଷ ଭୋଟରଙ୍କ ସଂଖ୍ୟା ବୃଦ୍ଧି','ମହିଳା ଭୋଟରଙ୍କ ସକ୍ରିୟତା ଏବଂ ସ୍ୱୟଂ ସହାୟକ ଗୋଷ୍ଠୀର ପ୍ରଭାବ','ଶିଳ୍ପପତିମାନଙ୍କର ପ୍ରତ୍ୟକ୍ଷ ସହଯୋଗ','ବିଦେଶୀ ପୁଞ୍ଜି ନିବେଶର ପ୍ରଭାବ'],
   a:1,
   exp:'Refers to Passage'},

{q:"<span style='font-weight: normal;'> ନିମ୍ନଲିଖିତ ଅନୁଚ୍ଛେଦକୁ ଧ୍ୟାନର ସହିତ ପଢ଼ନ୍ତୁ ଏବଂ ଦିଆଯାଇଥିବା ପ୍ରଶ୍ନଗୁଡ଼ିକର ସଠିକ୍ ଉତ୍ତର ବାଛନ୍ତୁ।<br><br>ଗଣତାନ୍ତ୍ରିକ ବ୍ୟବସ୍ଥାରେ ନିର୍ବାଚନ ହେଉଛି ଜନମତର ପ୍ରତିଫଳନ ଏବଂ ଓଡ଼ିଶା ଭଳି ଏକ ରାଜ୍ୟରେ ଏହାର ଗୁରୁତ୍ୱ ଅତି ବ୍ୟାପକ। ଓଡ଼ିଶାର ରାଜନୈତିକ ଇତିହାସକୁ ଅନୁଧ୍ୟାନ କଲେ ଜଣାଯାଏ ଯେ, ଏଠାରେ ଭୋଟରମାନେ ସ୍ଥିରତା ଏବଂ ପ୍ରଗତିଶୀଳ ନେତୃତ୍ୱକୁ ସର୍ବଦା ପ୍ରାଧାନ୍ୟ ଦେଇଛନ୍ତି। ନିର୍ବାଚନ କେବଳ ପ୍ରତିନିଧି ଚୟନର ଏକ ମାଧ୍ୟମ ନୁହେଁ, ବରଂ ଏହା ରାଜ୍ୟର ଆର୍ଥସାମାଜିକ ରୂପରେଖ ନିର୍ଦ୍ଧାରଣ କରିବାର ଏକ ଶକ୍ତିଶାଳୀ ଆୟୁଧ। ଓଡ଼ିଶାରେ ନିର୍ବାଚନ ସମୟରେ ବିଭିନ୍ନ ଆଞ୍ଚଳିକ ଏବଂ ଜାତୀୟ ଦଳଗୁଡ଼ିକ ମଧ୍ୟରେ ଚାଲିଥିବା ପ୍ରତିଦ୍ୱନ୍ଦ୍ୱିତା ଗଣତନ୍ତ୍ରକୁ ଅଧିକ ସୁଦୃଢ଼ କରିଥାଏ। ବିଶେଷ କରି ମହିଳା ଭୋଟରଙ୍କ ସକ୍ରିୟ ଅଂଶଗ୍ରହଣ ଏବଂ ସ୍ୱୟଂ ସହାୟକ ଗୋଷ୍ଠୀଗୁଡ଼ିକର ପ୍ରଭାବ ଓଡ଼ିଶା ନିର୍ବାଚନକୁ ଏକ ନୂତନ ମୋଡ଼ ଦେଇଛି। <br><br>ତେବେ ନିର୍ବାଚନ ପ୍ରକ୍ରିୟାରେ ସ୍ୱଚ୍ଛତା ଏବଂ ନିରପେକ୍ଷତା ବଜାୟ ରଖିବା ପ୍ରଶାସନ ପାଇଁ ଏକ ବଡ଼ ଆହ୍ୱାନ। ଅର୍ଥବଳ ଓ ବାହୁବଳର ପ୍ରଭାବକୁ ରୋକିବା ସହ ଶାନ୍ତିପୂର୍ଣ୍ଣ ଭାବେ ମତଦାନ ସାବ୍ୟସ୍ତ କରିବା ଉପରେ ନିର୍ବାଚନ କମିଶନ ଗୁରୁତ୍ୱାରୋପ କରନ୍ତି। ଗ୍ରାମାଞ୍ଚଳର ଶିକ୍ଷିତ ଯୁବପିଢ଼ି ଏବେ ନିର୍ବାଚନୀ ଇସ୍ତାହାର ଏବଂ ବିକାଶମୂଳକ କାର୍ଯ୍ୟର ମୂଲ୍ୟାଙ୍କନ କରି ଭୋଟ ଦେବାକୁ ଆଗ୍ରହ ପ୍ରକାଶ କରୁଛନ୍ତି, ଯାହା ଏକ ସୁସ୍ଥ ଗଣତନ୍ତ୍ରର ସୂଚକ। ଓଡ଼ିଶାରେ ସ୍ଥାନୀୟ ସମସ୍ୟା ଯଥା କୃଷି, ଶିଳ୍ପାୟନ ଏବଂ ନିଯୁକ୍ତି ନିର୍ବାଚନର ମୁଖ୍ୟ ପ୍ରସଙ୍ଗ ପାଲଟିଥାଏ। ରାଜନୈତିକ ଦଳଗୁଡ଼ିକ ନିଜର ପ୍ରଚାର ମାଧ୍ୟମରେ ଜନସାଧାରଣଙ୍କ ନିକଟତର ହେବାକୁ ଚେଷ୍ଟା କରୁଥିବା ବେଳେ, ଶେଷ ନିଷ୍ପତ୍ତି କେବଳ ଜନତା ଜନାର୍ଦ୍ଦନଙ୍କ ହାତରେ ହିଁ ଥାଏ।</span><br><br> ନିମ୍ନୋକ୍ତ ମଧ୍ୟରୁ କେଉଁଟି ଅନୁଚ୍ଛେଦରେ ଏକ ଆହ୍ୱାନ ଭାବେ ବର୍ଣ୍ଣନା କରାଯାଇଛି?",
   o:['ଶାନ୍ତିପୂର୍ଣ୍ଣ ଭାବେ ମତଦାନ କରାଇବା ଏବଂ ସ୍ୱଚ୍ଛତା ରକ୍ଷା କରିବା','କୃଷି କ୍ଷେତ୍ରରେ ଅଧିକ ଉତ୍ପାଦନ କରିବା','କେବଳ ସହରାଞ୍ଚଳରେ ନିର୍ବାଚନ ପ୍ରଚାର କରିବା','ନିର୍ବାଚନ ସମୟରେ ଅଧିକ ଛୁଟି ଘୋଷଣା କରିବା'],

/* ===== End questions with explanations ===== */

let answers={}, index=0, timeLeft, timerInt;

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if(saved){
    if(saved.answers) answers = saved.answers; // restore previous answers
    showScore(saved);
  } else {
    loader.classList.add("hidden");
    instruction.classList.remove("hidden");
  }
};

function startTest(){
  instruction.classList.add("hidden");
  test.classList.remove("hidden");
  timeLeft=TEST_DURATION_MINUTES*60;
  timerInt=setInterval(runTimer,1000);
  buildGrid();loadQ();
}

function runTimer(){
  if(timeLeft<=0){submitTest();return;}
  timeLeft--;
  timer.innerText=`${String(Math.floor(timeLeft/60)).padStart(2,"0")}:${String(timeLeft%60).padStart(2,"0")}`;
}

function loadQ(){
  const q = questions[index];
  question.innerHTML = (index + 1) + ". " + q.q;

  /* ===== IMAGE LOGIC ===== */
  imgWrap.classList.add("hidden");
  qImg.style.display = "none";
  imgLoader.style.display = "block";

  if(q.img){
    imgWrap.classList.remove("hidden");
    qImg.src = q.img;

    qImg.onload = () => {
      imgLoader.style.display = "none";
      qImg.style.display = "block";
    };

    qImg.onerror = () => {
      imgWrap.classList.add("hidden");
    };
  }

  options.innerHTML="";
  q.o.forEach((t,i)=>{
    const d=document.createElement("div");
    d.className="option"+(answers[index]===i?" selected":"");
    d.innerText=t;
    d.onclick=()=>{
      answers[index]=answers[index]===i?null:i;

      /* ===== Save answers to localStorage ===== */
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      saved.answers = answers;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      /* ===== End save ===== */

      loadQ();
      updateGrid();
    };
    options.appendChild(d);
  });

  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === questions.length - 1;
}

function nextQ(){index++;loadQ();}
function prevQ(){index--;loadQ();}

function buildGrid(){
  grid.innerHTML="";
  questions.forEach((_,i)=>{
    const d=document.createElement("div");
    d.innerText=i+1;
    d.onclick=()=>{index=i;loadQ();};
    grid.appendChild(d);
  });
}

function updateGrid(){
  [...grid.children].forEach((d,i)=>d.classList.toggle("attempted",answers[i]!=null));
}

function submitTest(){
  clearInterval(timerInt);
  test.classList.add("hidden");
  loader.classList.remove("hidden");
  loader.querySelector("p").innerText="Saving score & calculating rank…";

  let correct=0,wrong=0;
  questions.forEach((q,i)=>{
    if(answers[i]==null)return;
    answers[i]===q.a?correct++:wrong++;
  });

  const score=+(correct-wrong*NEGATIVE_MARK).toFixed(2);

  const baseData={
    phone:user.phone,
    name:user.name,
    score,correct,wrong,
    unattempted:questions.length-correct-wrong,
    updatedAt:Date.now()
  };

  db.collection("tests").doc(TEST_ID).collection("results").doc(user.phone)
  .set(baseData,{merge:true})
  .then(()=>calculateRank(baseData));
}

function calculateRank(myData){
  db.collection("tests").doc(TEST_ID).collection("results").get()
  .then(snap=>{
    const arr=snap.docs.map(d=>({...d.data(),id:d.id}));
    arr.sort((a,b)=>b.score-a.score);
    const rank=arr.findIndex(x=>x.id===user.phone)+1;
    myData.rankText=`${rank} / ${arr.length}`;
    myData.answers=answers;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(myData));
    showScore(myData);
  });
}

function showScore(r){
  loader.classList.add("hidden");
  score.classList.remove("hidden");
  userScore.innerText=`Hi ${r.name}, your score is ${r.score}`;
  stats.innerHTML=`Correct: ${r.correct}<br>Wrong: ${r.wrong}<br>Unattempted: ${r.unattempted}<br><b>Rank: ${r.rankText}</b>`;
  filterQ("all",document.querySelector(".filter button"));
}

function filterQ(type,btn){
  document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  review.innerHTML="";
  questions.forEach((q,i)=>{
    const a=answers[i];
    if(type==="correct"&&a!==q.a)return;
    if(type==="wrong"&&(a==null||a===q.a))return;
    if(type==="unattempted"&&a!=null)return;
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`
      <b>${q.q}</b><br>
      Your: ${a!=null?q.o[a]:"—"}<br>
      Correct: ${q.o[q.a]}<br>
      <details>
        <summary>Show Explanation</summary>
        <p>${q.exp || "No explanation provided."}</p>
      </details>
    `;
    review.appendChild(c);
  });
}

function reattempt(){popup.style.display="flex";}
function confirmReattempt(){localStorage.removeItem(STORAGE_KEY);location.reload();}
