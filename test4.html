{q:"<span style='font-weight: normal;'> ନିମ୍ନଲିଖିତ ଅନୁଚ୍ଛେଦକୁ ଧ୍ୟାନର ସହିତ ପଢ଼ନ୍ତୁ ଏବଂ ଦିଆଯାଇଥିବା ପ୍ରଶ୍ନଗୁଡ଼ିକର ସଠିକ୍ ଉତ୍ତର ବାଛନ୍ତୁ।<br><br>ଏକବିଂଶ ଶତାବ୍ଦୀର ସବୁଠାରୁ ବିପ୍ଳବୀ ବୈଷୟିକ ଜ୍ଞାନକୌଶଳ ହେଉଛି କୃତ୍ରିମ ବୁଦ୍ଧିମତ୍ତା ବା ଆର୍ଟିଫିସିଆଲ୍ ଇଣ୍ଟେଲିଜେନ୍ସ (AI)। ଏହା କେବଳ କମ୍ପ୍ୟୁଟର ବିଜ୍ଞାନର ଏକ ଶାଖା ନୁହେଁ, ବରଂ ମାନବ ସଭ୍ୟତାର କାର୍ଯ୍ୟଶୈଳୀକୁ ସମ୍ପୂର୍ଣ୍ଣ ରୂପେ ବଦଳାଇ ଦେବାର ଏକ ସାମର୍ଥ୍ୟ। ଏହାର ମୂଳ ଲକ୍ଷ୍ୟ ହେଉଛି ମେସିନ୍ ବା ଯନ୍ତ୍ର ମଧ୍ୟରେ ମଣିଷ ଭଳି ଚିନ୍ତା କରିବା, ଶିଖିବା ଏବଂ ନିଷ୍ପତ୍ତି ନେବାର ଦକ୍ଷତା ସୃଷ୍ଟି କରିବା। ଆଜିର ସମୟରେ ଆମେ ବ୍ୟବହାର କରୁଥିବା ସ୍ମାର୍ଟଫୋନ୍, ସୋସିଆଲ ମିଡିଆର ଆଲଗୋରିଦମ୍, ସ୍ୱୟଂଚାଳିତ କାର୍ଯ୍ୟ ଏବଂ ଚାଟ୍‌ବୋଟ୍‌ ପଛରେ ଏହି AI ପ୍ରଯୁକ୍ତିର ପ୍ରଭାବ ରହିଛି। ବିଶେଷ କରି 'ମେସିନ୍ ଲର୍ନିଂ' ଏବଂ 'ଡିପ୍ ଲର୍ନିଂ' ମାଧ୍ୟମରେ ଏହା ବିପୁଳ ପରିମାଣର ତଥ୍ୟକୁ ବିଶ୍ଳେଷଣ କରି ଭବିଷ୍ୟବାଣୀ କରିବାରେ ସକ୍ଷମ ହୋଇଛି।<br><br>ତେବେ AIର ଅଭ୍ୟୁଦୟ ଯେତିକି ସୁଯୋଗ ଆଣିଛି, ସେତିକି ଆହ୍ୱାନ ମଧ୍ୟ ସୃଷ୍ଟି କରିଛି। ଶିଳ୍ପ ଓ ବାଣିଜ୍ୟ କ୍ଷେତ୍ରରେ ସ୍ୱୟଂଚାଳିତ ବ୍ୟବହାର (Automation) ଯୋଗୁଁ ଅନେକ ପାରମ୍ପରିକ ନିଯୁକ୍ତି କ୍ଷେତ୍ର ପ୍ରଭାବିତ ହେବାର ଆଶଙ୍କା ରହିଛି। ଏହାବ୍ୟତୀତ, ତଥ୍ୟର ଗୋପନୀୟତା (Data Privacy) ଏବଂ ନୈତିକତା (Ethics) କୁ ନେଇ ମଧ୍ୟ ବିଭିନ୍ନ ପ୍ରଶ୍ନବାଚୀ ସୃଷ୍ଟି ହୋଇଛି। ଯଦିଓ AI ମଣିଷର କାର୍ଯ୍ୟକୁ ସହଜ ଓ ଦ୍ରୁତ କରିବାରେ ସହାୟକ ହେଉଛି, ତଥାପି ଏହାର ଅତ୍ୟଧିକ ନିର୍ଭରଶୀଳତା ମାନବୀୟ କ୍ରିୟାଶୀଳତାକୁ ହ୍ରାସ କରିପାରେ। ତେଣୁ ଏହି ବଳିଷ୍ଠ ପ୍ରଯୁକ୍ତିର ବିକାଶ ସହିତ ଏହାର ନିୟନ୍ତ୍ରଣ ଓ ସଠିକ୍ ବିନିଯୋଗ ପାଇଁ ଉପଯୁକ୍ତ ନୀତି ଓ ନିୟମର ଆବଶ୍ୟକତା ଅପରିହାର୍ଯ୍ୟ।</span><br><br> ଅନୁଚ୍ଛେଦ ଅନୁସାରେ କୃତ୍ରିମ ବୁଦ୍ଧିମତ୍ତାର ମୂଳ ଲକ୍ଷ୍ୟ କ’ଣ?",

{q:"<span style='font-weight: normal;'> ନିମ୍ନଲିଖିତ ଅନୁଚ୍ଛେଦକୁ ଧ୍ୟାନର ସହିତ ପଢ଼ନ୍ତୁ ଏବଂ ଦିଆଯାଇଥିବା ପ୍ରଶ୍ନଗୁଡ଼ିକର ସଠିକ୍ ଉତ୍ତର ବାଛନ୍ତୁ।<br><br>ଏକବିଂଶ ଶତାବ୍ଦୀର ସବୁଠାରୁ ବିପ୍ଳବୀ ବୈଷୟିକ ଜ୍ଞାନକୌଶଳ ହେଉଛି କୃତ୍ରିମ ବୁଦ୍ଧିମତ୍ତା ବା ଆର୍ଟିଫିସିଆଲ୍ ଇଣ୍ଟେଲିଜେନ୍ସ (AI)। ଏହା କେବଳ କମ୍ପ୍ୟୁଟର ବିଜ୍ଞାନର ଏକ ଶାଖା ନୁହେଁ, ବରଂ ମାନବ ସଭ୍ୟତାର କାର୍ଯ୍ୟଶୈଳୀକୁ ସମ୍ପୂର୍ଣ୍ଣ ରୂପେ ବଦଳାଇ ଦେବାର ଏକ ସାମର୍ଥ୍ୟ। ଏହାର ମୂଳ ଲକ୍ଷ୍ୟ ହେଉଛି ମେସିନ୍ ବା ଯନ୍ତ୍ର ମଧ୍ୟରେ ମଣିଷ ଭଳି ଚିନ୍ତା କରିବା, ଶିଖିବା ଏବଂ ନିଷ୍ପତ୍ତି ନେବାର ଦକ୍ଷତା ସୃଷ୍ଟି କରିବା। ଆଜିର ସମୟରେ ଆମେ ବ୍ୟବହାର କରୁଥିବା ସ୍ମାର୍ଟଫୋନ୍, ସୋସିଆଲ ମିଡିଆର ଆଲଗୋରିଦମ୍, ସ୍ୱୟଂଚାଳିତ କାର୍ଯ୍ୟ ଏବଂ ଚାଟ୍‌ବୋଟ୍‌ ପଛରେ ଏହି AI ପ୍ରଯୁକ୍ତିର ପ୍ରଭାବ ରହିଛି। ବିଶେଷ କରି 'ମେସିନ୍ ଲର୍ନିଂ' ଏବଂ 'ଡିପ୍ ଲର୍ନିଂ' ମାଧ୍ୟମରେ ଏହା ବିପୁଳ ପରିମାଣର ତଥ୍ୟକୁ ବିଶ୍ଳେଷଣ କରି ଭବିଷ୍ୟବାଣୀ କରିବାରେ ସକ୍ଷମ ହୋଇଛି।<br><br>ତେବେ AIର ଅଭ୍ୟୁଦୟ ଯେତିକି ସୁଯୋଗ ଆଣିଛି, ସେତିକି ଆହ୍ୱାନ ମଧ୍ୟ ସୃଷ୍ଟି କରିଛି। ଶିଳ୍ପ ଓ ବାଣିଜ୍ୟ କ୍ଷେତ୍ରରେ ସ୍ୱୟଂଚାଳିତ ବ୍ୟବହାର (Automation) ଯୋଗୁଁ ଅନେକ ପାରମ୍ପରିକ ନିଯୁକ୍ତି କ୍ଷେତ୍ର ପ୍ରଭାବିତ ହେବାର ଆଶଙ୍କା ରହିଛି। ଏହାବ୍ୟତୀତ, ତଥ୍ୟର ଗୋପନୀୟତା (Data Privacy) ଏବଂ ନୈତିକତା (Ethics) କୁ ନେଇ ମଧ୍ୟ ବିଭିନ୍ନ ପ୍ରଶ୍ନବାଚୀ ସୃଷ୍ଟି ହୋଇଛି। ଯଦିଓ AI ମଣିଷର କାର୍ଯ୍ୟକୁ ସହଜ ଓ ଦ୍ରୁତ କରିବାରେ ସହାୟକ ହେଉଛି, ତଥାପି ଏହାର ଅତ୍ୟଧିକ ନିର୍ଭରଶୀଳତା ମାନବୀୟ କ୍ରିୟାଶୀଳତାକୁ ହ୍ରାସ କରିପାରେ। ତେଣୁ ଏହି ବଳିଷ୍ଠ ପ୍ରଯୁକ୍ତିର ବିକାଶ ସହିତ ଏହାର ନିୟନ୍ତ୍ରଣ ଓ ସଠିକ୍ ବିନିଯୋଗ ପାଇଁ ଉପଯୁକ୍ତ ନୀତି ଓ ନିୟମର ଆବଶ୍ୟକତା ଅପରିହାର୍ଯ୍ୟ। </span><br><br> AI କିପରି ବିପୁଳ ପରିମାଣର ତଥ୍ୟ ବିଶ୍ଳେଷଣ କରି ଭବିଷ୍ୟବାଣୀ କରିଥାଏ?",

{q:"ସାମ୍ପ୍ରତିକ ପରିସ୍ଥିତିରେ\nP. ସୂଚନା ପ୍ରଯୁକ୍ତିବିଦ୍ୟାର ବ୍ୟାପକ ପ୍ରସାର\nQ. କେବଳ ଯୁବପିଢ଼ି ନୁହେଁ ବରଂ\nR. ସମଗ୍ର ମାନବ ସମାଜର ଜୀବନଶୈଳୀକୁ\nS. ସମ୍ପୂର୍ଣ୍ଣ ଭାବେ ବଦଳାଇ ଦେଇଛି",
 o:["PQRS","QRPS","PRQS","RPSQ"],
 a:0,
 exp:"ସଠିକ୍ ବ୍ୟବସ୍ଥା ‘PQRS’ ଯାହାରେ ବାକ୍ୟ ଅର୍ଥପୂର୍ଣ୍ଣ ହୁଏ।"}



    




    
];
/* ===== End questions with explanations ===== */

let answers={}, index=0, timeLeft, timerInt;

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if(saved){
    if(saved.answers) answers = saved.answers; // restore previous answers
    showScore(saved);
  } else {
    loader.classList.add("hidden");
    instruction.classList.remove("hidden");
  }
};

function startTest(){
  instruction.classList.add("hidden");
  test.classList.remove("hidden");
  timeLeft=TEST_DURATION_MINUTES*60;
  timerInt=setInterval(runTimer,1000);
  buildGrid();loadQ();
}

function runTimer(){
  if(timeLeft<=0){submitTest();return;}
  timeLeft--;
  timer.innerText=`${String(Math.floor(timeLeft/60)).padStart(2,"0")}:${String(timeLeft%60).padStart(2,"0")}`;
}

function loadQ(){
  const q = questions[index];
  question.innerHTML = (index + 1) + ". " + q.q;

  /* ===== IMAGE LOGIC ===== */
  imgWrap.classList.add("hidden");
  qImg.style.display = "none";
  imgLoader.style.display = "block";

  if(q.img){
    imgWrap.classList.remove("hidden");
    qImg.src = q.img;

    qImg.onload = () => {
      imgLoader.style.display = "none";
      qImg.style.display = "block";
    };

    qImg.onerror = () => {
      imgWrap.classList.add("hidden");
    };
  }

  options.innerHTML="";
  q.o.forEach((t,i)=>{
    const d=document.createElement("div");
    d.className="option"+(answers[index]===i?" selected":"");
    d.innerText=t;
    d.onclick=()=>{
      answers[index]=answers[index]===i?null:i;

      /* ===== Save answers to localStorage ===== */
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      saved.answers = answers;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      /* ===== End save ===== */

      loadQ();
      updateGrid();
    };
    options.appendChild(d);
  });

  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === questions.length - 1;
}

function nextQ(){index++;loadQ();}
function prevQ(){index--;loadQ();}

function buildGrid(){
  grid.innerHTML="";
  questions.forEach((_,i)=>{
    const d=document.createElement("div");
    d.innerText=i+1;
    d.onclick=()=>{index=i;loadQ();};
    grid.appendChild(d);
  });
}

function updateGrid(){
  [...grid.children].forEach((d,i)=>d.classList.toggle("attempted",answers[i]!=null));
}

function submitTest(){
  clearInterval(timerInt);
  test.classList.add("hidden");
  loader.classList.remove("hidden");
  loader.querySelector("p").innerText="Saving score & calculating rank…";

  let correct=0,wrong=0;
  questions.forEach((q,i)=>{
    if(answers[i]==null)return;
    answers[i]===q.a?correct++:wrong++;
  });

  const score=+(correct-wrong*NEGATIVE_MARK).toFixed(2);

  const baseData={
    phone:user.phone,
    name:user.name,
    score,correct,wrong,
    unattempted:questions.length-correct-wrong,
    updatedAt:Date.now()
  };

  db.collection("tests").doc(TEST_ID).collection("results").doc(user.phone)
  .set(baseData,{merge:true})
  .then(()=>calculateRank(baseData));
}

function calculateRank(myData){
  db.collection("tests").doc(TEST_ID).collection("results").get()
  .then(snap=>{
    const arr=snap.docs.map(d=>({...d.data(),id:d.id}));
    arr.sort((a,b)=>b.score-a.score);
    const rank=arr.findIndex(x=>x.id===user.phone)+1;
    myData.rankText=`${rank} / ${arr.length}`;
    myData.answers=answers;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(myData));
    showScore(myData);
  });
}

function showScore(r){
  loader.classList.add("hidden");
  score.classList.remove("hidden");
  userScore.innerText=`Hi ${r.name}, your score is ${r.score}`;
  stats.innerHTML=`Correct: ${r.correct}<br>Wrong: ${r.wrong}<br>Unattempted: ${r.unattempted}<br><b>Rank: ${r.rankText}</b>`;
  filterQ("all",document.querySelector(".filter button"));
}

function filterQ(type,btn){
  document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  review.innerHTML="";
  questions.forEach((q,i)=>{
    const a=answers[i];
    if(type==="correct"&&a!==q.a)return;
    if(type==="wrong"&&(a==null||a===q.a))return;
    if(type==="unattempted"&&a!=null)return;
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`
      <b>${q.q}</b><br>
      Your: ${a!=null?q.o[a]:"—"}<br>
      Correct: ${q.o[q.a]}<br>
      <details>
        <summary>Show Explanation</summary>
        <p>${q.exp || "No explanation provided."}</p>
      </details>
    `;
    review.appendChild(c);
  });
}

function reattempt(){popup.style.display="flex";}
function confirmReattempt(){localStorage.removeItem(STORAGE_KEY);location.reload();}
</script>
