{q:"<span style='font-weight: normal;'> ନିମ୍ନଲିଖିତ ଅନୁଚ୍ଛେଦକୁ ଧ୍ୟାନର ସହିତ ପଢ଼ନ୍ତୁ ଏବଂ ଦିଆଯାଇଥିବା ପ୍ରଶ୍ନଗୁଡ଼ିକର ସଠିକ୍ ଉତ୍ତର ବାଛନ୍ତୁ।<br><br>ବର୍ତ୍ତମାନର ବିଶ୍ୱାୟନ ଯୁଗରେ କୌଣସି ବି ଦେଶର ଅର୍ଥନୈତିକ ସମୃଦ୍ଧି ତାହାର ବୈଦେଶିକ ବାଣିଜ୍ୟ ଉପରେ ନିର୍ଭର କରେ। ଭାରତ ପାଇଁ ରପ୍ତାନି ଏବଂ ଆମଦାନୀ କେବଳ ବାଣିଜ୍ୟିକ କାରବାର ନୁହେଁ, ବରଂ ଏହା ଦେଶର ଜିଡିପି (GDP) ଅଭିବୃଦ୍ଧିର ଏକ ପ୍ରମୁଖ ଚାଳକ। ଭାରତର ରପ୍ତାନି ଟ୍ରେଣ୍ଡକୁ ଅନୁଧ୍ୟାନ କଲେ ଜଣାଯାଏ ଯେ, ପାରମ୍ପରିକ ଦ୍ରବ୍ୟ ଅପେକ୍ଷା ଏବେ ସେବା କ୍ଷେତ୍ର (Service Sector) ଏବଂ ବୈଷୟିକ ଜ୍ଞାନକୌଶଳ ଭିତ୍ତିକ ଦ୍ରବ୍ୟର ରପ୍ତାନି ବୃଦ୍ଧି ପାଇଛି। ବିଶେଷ କରି ସଫ୍ଟୱେର ସେବା, ଔଷଧ (Pharmaceuticals) ଏବଂ କୃଷିଜାତ ଦ୍ରବ୍ୟ ବିଶ୍ୱ ବଜାରରେ ଭାରତର ସ୍ୱତନ୍ତ୍ର ପରିଚୟ ସୃଷ୍ଟି କରିଛି। 'ମେକ୍ ଇନ୍ ଇଣ୍ଡିଆ' ଭଳି ଅଭିଯାନ ଦେଶର ଉତ୍ପାଦନ କ୍ଷମତା ବୃଦ୍ଧି କରି ରପ୍ତାନିକୁ ଏକ ନୂତନ ଦିଗ ଦେଇଛି।<br><br>ଅପରପକ୍ଷରେ, ଆମଦାନୀ କ୍ଷେତ୍ରରେ ଭାରତ ଅନେକାଂଶରେ ଅଶୋଧିତ ତୈଳ, ସୁନା ଏବଂ ଇଲେକ୍ଟ୍ରୋନିକ୍ସ ସାମଗ୍ରୀ ଉପରେ ନିର୍ଭରଶୀଳ। ଶକ୍ତି ଆବଶ୍ୟକତା ପୂରଣ ପାଇଁ ବିପୁଳ ପରିମାଣର ବୈଦେଶିକ ମୁଦ୍ରା ଅଶୋଧିତ ତୈଳ ଆମଦାନୀରେ ବ୍ୟୟ ହୋଇଥାଏ, ଯାହା ଦେଶର ଚଳନ୍ତି ଖାତା ନିଅଣ୍ଟ (Current Account Deficit) ଉପରେ ପ୍ରଭାବ ପକାଇଥାଏ। ଏହି ନିଅଣ୍ଟକୁ ସନ୍ତୁଳିତ କରିବା ପାଇଁ ସରକାର ସ୍ଥାନୀୟ ଉତ୍ପାଦନକୁ ପ୍ରୋତ୍ସାହନ ଦେବା ସହ ଆତ୍ମନିର୍ଭରଶୀଳତା ଉପରେ ଗୁରୁତ୍ୱ ଦେଉଛନ୍ତି। ବାଣିଜ୍ୟିକ ନୀତିରେ ପରିବର୍ତ୍ତନ ଏବଂ ବିଭିନ୍ନ ଦେଶ ସହିତ ମୁକ୍ତ ବାଣିଜ୍ୟ ଚୁକ୍ତି (FTA) ସ୍ୱାକ୍ଷର କରି ଭାରତ ନିଜର ବାଣିଜ୍ୟିକ ସୀମାକୁ ପ୍ରସାରିତ କରୁଛି। ତଥାପି, ବିଶ୍ୱ ବଜାରରେ ମୁଦ୍ରାସ୍ଫୀତି ଏବଂ ଭୂ-ରାଜନୈତିକ ଅସ୍ଥିରତା ଭାରତର ବୈଦେଶିକ ବାଣିଜ୍ୟ ପାଇଁ ସର୍ବଦା ଏକ ବଡ଼ ପ୍ରତିବନ୍ଧକ ଭାବେ ଉଭା ହୋଇଛି।</span><br><br> ଭାରତର ଚଳନ୍ତି ଖାତା ନିଅଣ୍ଟ (Current Account Deficit) ବୃଦ୍ଧି ପାଇବାର ମୁଖ୍ୟ କାରଣ କ’ଣ?",

{q:"<span style='font-weight: normal;'> ନିମ୍ନଲିଖିତ ଅନୁଚ୍ଛେଦକୁ ଧ୍ୟାନର ସହିତ ପଢ଼ନ୍ତୁ ଏବଂ ଦିଆଯାଇଥିବା ପ୍ରଶ୍ନଗୁଡ଼ିକର ସଠିକ୍ ଉତ୍ତର ବାଛନ୍ତୁ।<br><br>ବର୍ତ୍ତମାନର ବିଶ୍ୱାୟନ ଯୁଗରେ କୌଣସି ବି ଦେଶର ଅର୍ଥନୈତିକ ସମୃଦ୍ଧି ତାହାର ବୈଦେଶିକ ବାଣିଜ୍ୟ ଉପରେ ନିର୍ଭର କରେ। ଭାରତ ପାଇଁ ରପ୍ତାନି ଏବଂ ଆମଦାନୀ କେବଳ ବାଣିଜ୍ୟିକ କାରବାର ନୁହେଁ, ବରଂ ଏହା ଦେଶର ଜିଡିପି (GDP) ଅଭିବୃଦ୍ଧିର ଏକ ପ୍ରମୁଖ ଚାଳକ। ଭାରତର ରପ୍ତାନି ଟ୍ରେଣ୍ଡକୁ ଅନୁଧ୍ୟାନ କଲେ ଜଣାଯାଏ ଯେ, ପାରମ୍ପରିକ ଦ୍ରବ୍ୟ ଅପେକ୍ଷା ଏବେ ସେବା କ୍ଷେତ୍ର (Service Sector) ଏବଂ ବୈଷୟିକ ଜ୍ଞାନକୌଶଳ ଭିତ୍ତିକ ଦ୍ରବ୍ୟର ରପ୍ତାନି ବୃଦ୍ଧି ପାଇଛି। ବିଶେଷ କରି ସଫ୍ଟୱେର ସେବା, ଔଷଧ (Pharmaceuticals) ଏବଂ କୃଷିଜାତ ଦ୍ରବ୍ୟ ବିଶ୍ୱ ବଜାରରେ ଭାରତର ସ୍ୱତନ୍ତ୍ର ପରିଚୟ ସୃଷ୍ଟି କରିଛି। 'ମେକ୍ ଇନ୍ ଇଣ୍ଡିଆ' ଭଳି ଅଭିଯାନ ଦେଶର ଉତ୍ପାଦନ କ୍ଷମତା ବୃଦ୍ଧି କରି ରପ୍ତାନିକୁ ଏକ ନୂତନ ଦିଗ ଦେଇଛି।<br><br>ଅପରପକ୍ଷରେ, ଆମଦାନୀ କ୍ଷେତ୍ରରେ ଭାରତ ଅନେକାଂଶରେ ଅଶୋଧିତ ତୈଳ, ସୁନା ଏବଂ ଇଲେକ୍ଟ୍ରୋନିକ୍ସ ସାମଗ୍ରୀ ଉପରେ ନିର୍ଭରଶୀଳ। ଶକ୍ତି ଆବଶ୍ୟକତା ପୂରଣ ପାଇଁ ବିପୁଳ ପରିମାଣର ବୈଦେଶିକ ମୁଦ୍ରା ଅଶୋଧିତ ତୈଳ ଆମଦାନୀରେ ବ୍ୟୟ ହୋଇଥାଏ, ଯାହା ଦେଶର ଚଳନ୍ତି ଖାତା ନିଅଣ୍ଟ (Current Account Deficit) ଉପରେ ପ୍ରଭାବ ପକାଇଥାଏ। ଏହି ନିଅଣ୍ଟକୁ ସନ୍ତୁଳିତ କରିବା ପାଇଁ ସରକାର ସ୍ଥାନୀୟ ଉତ୍ପାଦନକୁ ପ୍ରୋତ୍ସାହନ ଦେବା ସହ ଆତ୍ମନିର୍ଭରଶୀଳତା ଉପରେ ଗୁରୁତ୍ୱ ଦେଉଛନ୍ତି। ବାଣିଜ୍ୟିକ ନୀତିରେ ପରିବର୍ତ୍ତନ ଏବଂ ବିଭିନ୍ନ ଦେଶ ସହିତ ମୁକ୍ତ ବାଣିଜ୍ୟ ଚୁକ୍ତି (FTA) ସ୍ୱାକ୍ଷର କରି ଭାରତ ନିଜର ବାଣିଜ୍ୟିକ ସୀମାକୁ ପ୍ରସାରିତ କରୁଛି। ତଥାପି, ବିଶ୍ୱ ବଜାରରେ ମୁଦ୍ରାସ୍ଫୀତି ଏବଂ ଭୂ-ରାଜନୈତିକ ଅସ୍ଥିରତା ଭାରତର ବୈଦେଶିକ ବାଣିଜ୍ୟ ପାଇଁ ସର୍ବଦା ଏକ ବଡ଼ ପ୍ରତିବନ୍ଧକ ଭାବେ ଉଭା ହୋଇଛି। </span><br><br>ଅନୁଚ୍ଛେଦରେ ଉଲ୍ଲେଖ ଥିବା 'ବୈଦେଶିକ ବାଣିଜ୍ୟ ପାଇଁ ପ୍ରତିବନ୍ଧକ' ଗୁଡ଼ିକ କେଉଁଟି?",
 o:['ମୁକ୍ତ ବାଣିଜ୍ୟ ଚୁକ୍ତି ସ୍ୱାକ୍ଷର କରିବା','ବିଶ୍ୱ ବଜାରରେ ମୁଦ୍ରାସ୍ଫୀତି ଏବଂ ଭୂ-ରାଜନୈତିକ ଅସ୍ଥିରତା','ସେବା କ୍ଷେତ୍ରରେ ଅଭିବୃଦ୍ଧି ଘଟିବା','ବୈଦେଶିକ ମୁଦ୍ରା ଭଣ୍ଡାର ବୃଦ୍ଧି ପାଇବା'],
 a:1,
 exp:'Refers to Passage'},

{q:"<span style='font-weight: normal;'> ନିମ୍ନଲିଖିତ ଅନୁଚ୍ଛେଦକୁ ଧ୍ୟାନର ସହିତ ପଢ଼ନ୍ତୁ ଏବଂ ଦିଆଯାଇଥିବା ପ୍ରଶ୍ନଗୁଡ଼ିକର ସଠିକ୍ ଉତ୍ତର ବାଛନ୍ତୁ।<br><br>ବର୍ତ୍ତମାନର ବିଶ୍ୱାୟନ ଯୁଗରେ କୌଣସି ବି ଦେଶର ଅର୍ଥନୈତିକ ସମୃଦ୍ଧି ତାହାର ବୈଦେଶିକ ବାଣିଜ୍ୟ ଉପରେ ନିର୍ଭର କରେ। ଭାରତ ପାଇଁ ରପ୍ତାନି ଏବଂ ଆମଦାନୀ କେବଳ ବାଣିଜ୍ୟିକ କାରବାର ନୁହେଁ, ବରଂ ଏହା ଦେଶର ଜିଡିପି (GDP) ଅଭିବୃଦ୍ଧିର ଏକ ପ୍ରମୁଖ ଚାଳକ। ଭାରତର ରପ୍ତାନି ଟ୍ରେଣ୍ଡକୁ ଅନୁଧ୍ୟାନ କଲେ ଜଣାଯାଏ ଯେ, ପାରମ୍ପରିକ ଦ୍ରବ୍ୟ ଅପେକ୍ଷା ଏବେ ସେବା କ୍ଷେତ୍ର (Service Sector) ଏବଂ ବୈଷୟିକ ଜ୍ଞାନକୌଶଳ ଭିତ୍ତିକ ଦ୍ରବ୍ୟର ରପ୍ତାନି ବୃଦ୍ଧି ପାଇଛି। ବିଶେଷ କରି ସଫ୍ଟୱେର ସେବା, ଔଷଧ (Pharmaceuticals) ଏବଂ କୃଷିଜାତ ଦ୍ରବ୍ୟ ବିଶ୍ୱ ବଜାରରେ ଭାରତର ସ୍ୱତନ୍ତ୍ର ପରିଚୟ ସୃଷ୍ଟି କରିଛି। 'ମେକ୍ ଇନ୍ ଇଣ୍ଡିଆ' ଭଳି ଅଭିଯାନ ଦେଶର ଉତ୍ପାଦନ କ୍ଷମତା ବୃଦ୍ଧି କରି ରପ୍ତାନିକୁ ଏକ ନୂତନ ଦିଗ ଦେଇଛି।<br><br>ଅପରପକ୍ଷରେ, ଆମଦାନୀ କ୍ଷେତ୍ରରେ ଭାରତ ଅନେକାଂଶରେ ଅଶୋଧିତ ତୈଳ, ସୁନା ଏବଂ ଇଲେକ୍ଟ୍ରୋନିକ୍ସ ସାମଗ୍ରୀ ଉପରେ ନିର୍ଭରଶୀଳ। ଶକ୍ତି ଆବଶ୍ୟକତା ପୂରଣ ପାଇଁ ବିପୁଳ ପରିମାଣର ବୈଦେଶିକ ମୁଦ୍ରା ଅଶୋଧିତ ତୈଳ ଆମଦାନୀରେ ବ୍ୟୟ ହୋଇଥାଏ, ଯାହା ଦେଶର ଚଳନ୍ତି ଖାତା ନିଅଣ୍ଟ (Current Account Deficit) ଉପରେ ପ୍ରଭାବ ପକାଇଥାଏ। ଏହି ନିଅଣ୍ଟକୁ ସନ୍ତୁଳିତ କରିବା ପାଇଁ ସରକାର ସ୍ଥାନୀୟ ଉତ୍ପାଦନକୁ ପ୍ରୋତ୍ସାହନ ଦେବା ସହ ଆତ୍ମନିର୍ଭରଶୀଳତା ଉପରେ ଗୁରୁତ୍ୱ ଦେଉଛନ୍ତି। ବାଣିଜ୍ୟିକ ନୀତିରେ ପରିବର୍ତ୍ତନ ଏବଂ ବିଭିନ୍ନ ଦେଶ ସହିତ ମୁକ୍ତ ବାଣିଜ୍ୟ ଚୁକ୍ତି (FTA) ସ୍ୱାକ୍ଷର କରି ଭାରତ ନିଜର ବାଣିଜ୍ୟିକ ସୀମାକୁ ପ୍ରସାରିତ କରୁଛି। ତଥାପି, ବିଶ୍ୱ ବଜାରରେ ମୁଦ୍ରାସ୍ଫୀତି ଏବଂ ଭୂ-ରାଜନୈତିକ ଅସ୍ଥିରତା ଭାରତର ବୈଦେଶିକ ବାଣିଜ୍ୟ ପାଇଁ ସର୍ବଦା ଏକ ବଡ଼ ପ୍ରତିବନ୍ଧକ ଭାବେ ଉଭା ହୋଇଛି। </span><br><br>ଅନୁଚ୍ଛେଦର ସ୍ୱର କିପରି ମନେହୁଏ?",

/* ===== End questions with explanations ===== */

let answers={}, index=0, timeLeft, timerInt;

window.onload = () => {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
  if(saved){
    if(saved.answers) answers = saved.answers; // restore previous answers
    showScore(saved);
  } else {
    loader.classList.add("hidden");
    instruction.classList.remove("hidden");
  }
};

function startTest(){
  instruction.classList.add("hidden");
  test.classList.remove("hidden");
  timeLeft=TEST_DURATION_MINUTES*60;
  timerInt=setInterval(runTimer,1000);
  buildGrid();loadQ();
}

function runTimer(){
  if(timeLeft<=0){submitTest();return;}
  timeLeft--;
  timer.innerText=`${String(Math.floor(timeLeft/60)).padStart(2,"0")}:${String(timeLeft%60).padStart(2,"0")}`;
}

function loadQ(){
  const q = questions[index];
  question.innerHTML = (index + 1) + ". " + q.q;

  /* ===== IMAGE LOGIC ===== */
  imgWrap.classList.add("hidden");
  qImg.style.display = "none";
  imgLoader.style.display = "block";

  if(q.img){
    imgWrap.classList.remove("hidden");
    qImg.src = q.img;

    qImg.onload = () => {
      imgLoader.style.display = "none";
      qImg.style.display = "block";
    };

    qImg.onerror = () => {
      imgWrap.classList.add("hidden");
    };
  }

  options.innerHTML="";
  q.o.forEach((t,i)=>{
    const d=document.createElement("div");
    d.className="option"+(answers[index]===i?" selected":"");
    d.innerText=t;
    d.onclick=()=>{
      answers[index]=answers[index]===i?null:i;

      /* ===== Save answers to localStorage ===== */
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
      saved.answers = answers;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      /* ===== End save ===== */

      loadQ();
      updateGrid();
    };
    options.appendChild(d);
  });

  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === questions.length - 1;
}

function nextQ(){index++;loadQ();}
function prevQ(){index--;loadQ();}

function buildGrid(){
  grid.innerHTML="";
  questions.forEach((_,i)=>{
    const d=document.createElement("div");
    d.innerText=i+1;
    d.onclick=()=>{index=i;loadQ();};
    grid.appendChild(d);
  });
}

function updateGrid(){
  [...grid.children].forEach((d,i)=>d.classList.toggle("attempted",answers[i]!=null));
}

function submitTest(){
  clearInterval(timerInt);
  test.classList.add("hidden");
  loader.classList.remove("hidden");
  loader.querySelector("p").innerText="Saving score & calculating rank…";

  let correct=0,wrong=0;
  questions.forEach((q,i)=>{
    if(answers[i]==null)return;
    answers[i]===q.a?correct++:wrong++;
  });

  const score=+(correct-wrong*NEGATIVE_MARK).toFixed(2);

  const baseData={
    phone:user.phone,
    name:user.name,
    score,correct,wrong,
    unattempted:questions.length-correct-wrong,
    updatedAt:Date.now()
  };

  db.collection("tests").doc(TEST_ID).collection("results").doc(user.phone)
  .set(baseData,{merge:true})
  .then(()=>calculateRank(baseData));
}

function calculateRank(myData){
  db.collection("tests").doc(TEST_ID).collection("results").get()
  .then(snap=>{
    const arr=snap.docs.map(d=>({...d.data(),id:d.id}));
    arr.sort((a,b)=>b.score-a.score);
    const rank=arr.findIndex(x=>x.id===user.phone)+1;
    myData.rankText=`${rank} / ${arr.length}`;
    myData.answers=answers;
    localStorage.setItem(STORAGE_KEY,JSON.stringify(myData));
    showScore(myData);
  });
}

function showScore(r){
  loader.classList.add("hidden");
  score.classList.remove("hidden");
  userScore.innerText=`Hi ${r.name}, your score is ${r.score}`;
  stats.innerHTML=`Correct: ${r.correct}<br>Wrong: ${r.wrong}<br>Unattempted: ${r.unattempted}<br><b>Rank: ${r.rankText}</b>`;
  filterQ("all",document.querySelector(".filter button"));
}

function filterQ(type,btn){
  document.querySelectorAll(".filter button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  review.innerHTML="";
  questions.forEach((q,i)=>{
    const a=answers[i];
    if(type==="correct"&&a!==q.a)return;
    if(type==="wrong"&&(a==null||a===q.a))return;
    if(type==="unattempted"&&a!=null)return;
    const c=document.createElement("div");
    c.className="card";
    c.innerHTML=`
      <b>${q.q}</b><br>
      Your: ${a!=null?q.o[a]:"—"}<br>
      Correct: ${q.o[q.a]}<br>
      <details>
        <summary>Show Explanation</summary>
        <p>${q.exp || "No explanation provided."}</p>
      </details>
    `;
    review.appendChild(c);
  });
}

function reattempt(){popup.style.display="flex";}
function confirmReattempt(){localStorage.removeItem(STORAGE_KEY);location.reload();}
</script>
</body>
</html>
